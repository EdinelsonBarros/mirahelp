<header>
      <button  mat-icon-button #menuTrigger="matMenuTrigger" [matMenuTriggerFor]="menu" 
      aria-label="Example icon-button with a menu">
            <mat-icon (click)="menuTrigger.onMenuOpen" class="menu">menu</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
            <button mat-menu-item routerLink="/home" >Home</button>
            <button mat-menu-item routerLink="/createCorporation">Cadastrar Unidade de Saúde</button>
      </mat-menu>
</header>
