<section>
      <h1>Cadastro</h1>
      <form [formGroup]="formCorp" (ngSubmit)="saveCorporation()">
            <mat-form-field>
                  <mat-label>Nome</mat-label>
                  <input matInput formControlName="name">
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label>Abre ás</mat-label>
                  <mat-select formControlName="hoursOpen" [value]="">
                        @for(open of hours; track open.id ){
                        <mat-option [value]="open.hour" >{{ open.hour }}</mat-option>
                        }
                  </mat-select>
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label>Fecha ás</mat-label>
                  <mat-select formControlName="hoursClose">
                        @for(hourClose of hours; track hourClose.id ){
                              <mat-option [value]="hourClose.hour">{{ hourClose.hour }}</mat-option>
                              }
                  </mat-select>
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label>Rua</mat-label>
                  <input formControlName="street" matInput>
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label >Número</mat-label>
                  <input formControlName="numberAdress" matInput>
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label>Bairro</mat-label>
                  <input formControlName="neighborhood" matInput>
            </mat-form-field>

            <mat-form-field>
                  <mat-label>Telefone</mat-label>
                  <input formControlName="phoneNumber" matInput>
            </mat-form-field>
      
            <mat-form-field>
                  <mat-label>Descreva os serviçoes oferecidos...</mat-label>
                  <textarea matInput formControlName="description"></textarea>
            </mat-form-field>

            <button [disabled]="!formCorp.valid" [ngClass]="formCorp.valid ? 'activedButton' : 'disabledButton'" type="submit"
            (click)="!formCorp.valid ? openSnackBarFormInvalid() : ''">Salvar</button>
      </form>

</section>
